name: 📊 Daily Market Report Slack (07:00 KST)

on:
  schedule:
    # 매일 오전 7시 KST = UTC 22:00 (전날)
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  send-market-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance google-genai requests pandas

      - name: Run Slack bot
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: python slack_bot.py
